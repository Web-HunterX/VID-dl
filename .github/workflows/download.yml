name: Download Video from Any Site

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'Video URL (YouTube, Instagram, Twitter, Aparat, etc.)'
        required: true
        type: string

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: Install dependencies & download video
        run: |
          # نصب ابزارهای مورد نیاز
          sudo apt update
          sudo apt install -y zip p7zip-full
          pip install yt-dlp

          # دریافت لینک از ورودی
          URL="${{ github.event.inputs.url }}"
          PASSWORD="salambarto"
          MAX_SIZE_MB=80

          mkdir -p video_temp
          cd video_temp

          echo "Downloading from: $URL"
          yt-dlp -f "bestvideo+bestaudio/best" --merge-output-format mp4 "$URL" -o "video.mp4"

          # اگه فرمت اول جواب نداد، با best دانلود کن
          if [ ! -f "video.mp4" ]; then
            echo "Trying with best format only..."
            yt-dlp -f "best" "$URL" -o "video.mp4"
          fi

          # اگه بازم نشد، خطا بده
          if [ ! -f "video.mp4" ]; then
            echo "Download failed! Unsupported site or invalid URL."
            exit 1
          fi

          # محاسبه حجم
          SIZE=$(stat -c%s "video.mp4")
          SIZE_MB=$((SIZE / 1024 / 1024))

          echo "Video size: ${SIZE_MB}MB"

          # رمزگذاری و تقسیم با ZIP
          # اول یه زیپ رمزدار از ویدیو میسازیم
          zip -P "$PASSWORD" "temp_archive.zip" "video.mp4"

          # اگه حجم زیپ از 80MB بیشتر بود، تقسیمش کن
          ZIP_SIZE=$(stat -c%s "temp_archive.zip")
          ZIP_SIZE_MB=$((ZIP_SIZE / 1024 / 1024))

          if [ $ZIP_SIZE_MB -le $MAX_SIZE_MB ]; then
            echo "Archive is ${ZIP_SIZE_MB}MB, no splitting needed"
            mv "temp_archive.zip" "final_archive.zip"
          else
            echo "Archive is ${ZIP_SIZE_MB}MB, splitting into ${MAX_SIZE_MB}MB parts..."
            # تقسیم فایل زیپ به چند قسمت
            split -b ${MAX_SIZE_MB}M "temp_archive.zip" "final_archive.zip.part"
            
            # تغییر اسم فایل‌ها به .z01, .z02, ...
            PART_NUM=1
            for part in final_archive.zip.part*; do
              if [ $PART_NUM -eq 1 ]; then
                mv "$part" "final_archive.zip"
              else
                mv "$part" "final_archive.z$(printf '%02d' $((PART_NUM-1)))"
              fi
              PART_NUM=$((PART_NUM + 1))
            done
            rm -f "temp_archive.zip"
          fi

          cd ..
          
          # لیست فایل‌های داخل video_temp برای دیباگ
          echo "Files in video_temp:"
          ls -la video_temp/

      - name: Upload archive
        uses: actions/upload-artifact@v4
        with:
          name: video-archive
          path: video_temp/
          retention-days: 1

      - name: Wait and cleanup
        run: |
          echo "Waiting 5 minutes before cleaning up..."
          sleep 300
          rm -rf video_temp
          echo "Cleanup completed."
