name: Download Video from Any Site

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'Video URL (YouTube, Instagram, Twitter, Aparat, etc.)'
        required: true
        type: string

jobs:
  download:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Install dependencies & download video
        run: |
          # نصب ابزارهای مورد نیاز
          sudo apt update
          sudo apt install -y zip
          pip install yt-dlp

          # دریافت لینک از ورودی
          URL="${{ github.event.inputs.url }}"
          PASSWORD="salambarto"
          MAX_SIZE_MB=80

          echo "Downloading from: $URL"
          yt-dlp -f "bestvideo+bestaudio/best" --merge-output-format mp4 "$URL" -o "video.mp4"

          if [ ! -f "video.mp4" ]; then
            echo "Trying with best format only..."
            yt-dlp -f "best" "$URL" -o "video.mp4"
          fi

          if [ ! -f "video.mp4" ]; then
            echo "Download failed! Unsupported site or invalid URL."
            exit 1
          fi

          SIZE=$(stat -c%s "video.mp4")
          SIZE_MB=$((SIZE / 1024 / 1024))

          echo "Video size: ${SIZE_MB}MB"

          mkdir -p release_files

          zip -P "$PASSWORD" "release_files/video_archive.zip" "video.mp4"
          
          cd release_files
          
          ZIP_SIZE=$(stat -c%s "video_archive.zip")
          ZIP_SIZE_MB=$((ZIP_SIZE / 1024 / 1024))

          if [ $ZIP_SIZE_MB -gt $MAX_SIZE_MB ]; then
            echo "ZIP is ${ZIP_SIZE_MB}MB, splitting into ${MAX_SIZE_MB}MB parts..."
            split -b ${MAX_SIZE_MB}M "video_archive.zip" "video_archive.zip.part_"
            rm "video_archive.zip"
            ls -la video_archive.zip.part_*
          fi
          
          rm -f ../video.mp4
          cd ..

      - name: Push to repository
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # دریافت آخرین تغییرات
          git fetch origin main
          git pull origin main --rebase || true
          
          # اضافه کردن و commit
          git add release_files/
          git commit -m "Add downloaded video files [skip ci]" || echo "No changes to commit"
          
          # push کردن
          git push origin main

      - name: Wait and cleanup
        run: |
          echo "Waiting 15 minutes before cleaning up..."
          sleep 900
          
          git fetch origin main
          git pull origin main --rebase || true
          git rm -rf release_files/
          git commit -m "Cleanup video files [skip ci]" || echo "No files to clean"
          git push origin main
          
          rm -rf release_files video.mp4
          echo "Cleanup completed."
