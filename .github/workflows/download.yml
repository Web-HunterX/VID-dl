name: Download Video from Any Site

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'Video URL (YouTube, Instagram, Twitter, Aparat, etc.)'
        required: true
        type: string

jobs:
  download:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Install dependencies & download video
        run: |
          # نصب ابزارهای مورد نیاز
          sudo apt update
          sudo apt install -y zip nodejs npm
          pip install --upgrade yt-dlp
          
          # نصب بسته کمکی برای PO Token
          sudo npm install -g yt-dlp-token

          # دریافت لینک از ورودی
          URL="${{ github.event.inputs.url }}"
          PASSWORD="salambarto"
          MAX_SIZE_MB=80

          echo "Downloading from: $URL"
          
          # روش اول: تلاش با PO Token (جدیدترین روش برای یوتیوب)
          if [[ "$URL" == *"youtube.com"* ]] || [[ "$URL" == *"youtu.be"* ]]; then
            echo "YouTube video detected - using PO Token method..."
            
            # دریافت توکن خودکار
            TOKEN=$(yt-dlp-token generate 2>/dev/null || echo "")
            
            if [ -n "$TOKEN" ]; then
              echo "PO Token generated successfully"
              yt-dlp --extractor-args "youtube:po_token=${TOKEN}" \
                     --extractor-args "youtube:player-client=web,android" \
                     --extractor-args "youtube:player-skip=webpage,configs" \
                     --no-check-certificate \
                     -f "bestvideo+bestaudio/best" \
                     --merge-output-format mp4 \
                     "$URL" -o "video.mp4"
            else
              echo "PO Token generation failed, trying alternative method..."
              yt-dlp --extractor-args "youtube:player-client=ios,android_test,web_embedded" \
                     --extractor-args "youtube:player-skip=webpage,js" \
                     --no-check-certificate \
                     -f "bestvideo+bestaudio/best" \
                     --merge-output-format mp4 \
                     "$URL" -o "video.mp4"
            fi
          else
            # برای سایت‌های غیر از یوتیوب
            echo "Non-YouTube video detected..."
            yt-dlp -f "bestvideo+bestaudio/best" --merge-output-format mp4 "$URL" -o "video.mp4"
          fi

          # اگر روش اول جواب نداد، روش جایگزین با کلاینت اندروید
          if [ ! -f "video.mp4" ]; then
            echo "First method failed, trying fallback method with android client..."
            yt-dlp --extractor-args "youtube:player-client=android" \
                   --extractor-args "youtube:player-skip=webpage" \
                   --no-check-certificate \
                   -f "best[ext=mp4]" \
                   "$URL" -o "video.mp4"
          fi

          # اگر هیچ روشی جواب نداد
          if [ ! -f "video.mp4" ]; then
            echo "Download failed! Unsupported site or invalid URL."
            exit 1
          fi

          SIZE=$(stat -c%s "video.mp4")
          SIZE_MB=$((SIZE / 1024 / 1024))

          echo "Video size: ${SIZE_MB}MB"

          mkdir -p release_files

          zip -P "$PASSWORD" "release_files/video_archive.zip" "video.mp4"
          
          cd release_files
          
          ZIP_SIZE=$(stat -c%s "video_archive.zip")
          ZIP_SIZE_MB=$((ZIP_SIZE / 1024 / 1024))

          if [ $ZIP_SIZE_MB -gt $MAX_SIZE_MB ]; then
            echo "ZIP is ${ZIP_SIZE_MB}MB, splitting into ${MAX_SIZE_MB}MB parts..."
            split -b ${MAX_SIZE_MB}M "video_archive.zip" "video_archive.zip.part_"
            rm "video_archive.zip"
            ls -la video_archive.zip.part_*
          fi
          
          rm -f ../video.mp4
          cd ..

      - name: Push to repository
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # دریافت آخرین تغییرات
          git fetch origin main
          git pull origin main --rebase || true
          
          # اضافه کردن و commit
          git add release_files/
          git commit -m "Add downloaded video files [skip ci]" || echo "No changes to commit"
          
          # push کردن
          git push origin main

      - name: Wait and cleanup
        run: |
          echo "Waiting 15 minutes before cleaning up..."
          sleep 900
          
          git fetch origin main
          git pull origin main --rebase || true
          git rm -rf release_files/
          git commit -m "Cleanup video files [skip ci]" || echo "No files to clean"
          git push origin main
          
          rm -rf release_files video.mp4
          echo "Cleanup completed."
